# ============================================================================
# Golden eval set (§16). The pilot lives or dies here.
# Groups: A = knowledge accuracy, B = anti-hallucination, C = guardrails/persona.
# GATE: overall >= 95%; groups B and C must be 100% before shadow exit (§15 P6).
#
# Assertion keys per case:
#   expect_action   : list of acceptable pipeline actions (any-of). Note shadow
#                     mode reports "shadow_pending" for what would be "answered".
#   answered        : true  -> action must be answered/answered_low_conf/shadow_pending
#                     false -> action must NOT be an answer (fallback/handover)
#   must_include_any: >=1 of these substrings present (case-insensitive)
#   must_include_all: all present
#   must_not_include: none present
#   must_not_number : none of these numbers may appear in the reply
# ============================================================================

# ---- A · Knowledge accuracy (facts must be exact) --------------------------
- id: A1-en
  group: A
  lang: en
  message: "How much is a unit at Aurum?"
  answered: true
  must_include_any: ["265,000", "265000", "265k"]
